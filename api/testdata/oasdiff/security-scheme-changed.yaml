openapi: 3.1.0
info:
  title: Security compatibility fixture
  version: "1"
paths:
  /stable:
    get:
      operationId: stableOperation
      security:
        - bearer: []
      responses:
        "200":
          description: Success
components:
  securitySchemes:
    bearer:
      type: http
      scheme: basic
      bearerFormat: API key
